<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная таблица</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #2ea44f; }
        .table-container { max-width: 900px; margin: 0 auto; overflow-x: auto; background: white; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        
        .controls { text-align: center; margin-bottom: 20px; }
        .controls label { font-weight: bold; margin-right: 10px; font-size: 16px; }
        select { padding: 10px 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background-color: #fff; }
        select:hover { border-color: #2ea44f; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        tr:hover { background-color: #f9f9f9; }

        /* --- ОСОБЫЕ СТИЛИ ДЛЯ ВАШЕЙ ТАБЛИЦЫ --- */
        /* 1. Настройка первой строки ("Группа А") */
        tr:nth-child(1) td { font-weight: bold; font-size: 18px; color: #2ea44f; text-align: left; background-color: #fff; border-top: none; border-left: none; border-right: none;}
        /* 2. Настройка второй строки (Заголовки "1", "2", "3"...) */
        tr:nth-child(2) td { background-color: #2ea44f; color: white; font-weight: bold; border-color: #1f853d; }
        
        #loading { text-align: center; font-size: 18px; color: #666; margin: 20px 0; display: none; }
    </style>
</head>
<body>

    <div class="table-container">
        <h2>🏆 Турнирная Таблица</h2>
        
        <div class="controls">
            <label for="sheet-select">Выберите этап/группу:</label>
            <select id="sheet-select"></select>
        </div>

        <div id="loading">Загрузка данных... ⏳</div>

        <table id="tournament-table">
            </table>
    </div>

    <script>
        const SHEET_ID = '1Aq8Kow_unD9Z_mclRBg0mcPl8Ibh64_s7rqVrvdVq3I'; 
        
        // ВНИМАНИЕ: Напишите здесь точные названия листов из вашей таблицы!
        const SHEET_NAMES = ['Лист1', 'Лист2']; 

        const selectEl = document.getElementById('sheet-select');
        const tableEl = document.getElementById('tournament-table');
        const loadingEl = document.getElementById('loading');

        SHEET_NAMES.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            selectEl.appendChild(option);
        });

        function loadSheet(sheetName) {
            loadingEl.style.display = 'block';
            tableEl.innerHTML = ''; 

            // Параметр headers=0 заставляет код считывать абсолютно все строки как данные
            const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(sheetName)}`;

            fetch(API_URL)
                .then(response => response.text())
                .then(text => {
                    const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1];
                    const data = JSON.parse(jsonString);
                    loadingEl.style.display = 'none';

                    if (!data.table || !data.table.rows) {
                        tableEl.innerHTML = '<tr><td style="color:red;">Данные не найдены.</td></tr>';
                        return;
                    }

                    data.table.rows.forEach(row => {
                        const tr = document.createElement('tr');
                        let isEmptyRow = true; 

                        // Проверяем, не пустая ли строка целиком
                        row.c.forEach(cell => {
                            if (cell !== null && cell.v !== null && String(cell.v).trim() !== '') {
                                isEmptyRow = false;
                            }
                        });

                        if (isEmptyRow) return;

                        // Создаем ячейки
                        row.c.forEach(cell => {
                            const td = document.createElement('td');
                            
                            let cellValue = '';
                            if (cell !== null && cell.v !== null) {
                                cellValue = cell.f !== undefined ? String(cell.f) : String(cell.v);
                            }
                            
                            const valStr = cellValue.trim();

                            // ГЛАВНОЕ УСЛОВИЕ: если стоит прочерк, делаем красным!
                            if (valStr === '-') {
                                td.style.backgroundColor = '#ff4d4d'; // Красный цвет
                                td.textContent = ''; // Убираем сам минус визуально (по желанию)
                            } else {
                                td.textContent = valStr;
                            }
                            
                            tr.appendChild(td);
                        });
                        
                        tableEl.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Ошибка загрузки:', error);
                    loadingEl.style.display = 'none';
                    tableEl.innerHTML = `<tr><td style="color: red;"><b>Ошибка загрузки!</b> Проверьте название листа.</td></tr>`;
                });
        }

        selectEl.addEventListener('change', (event) => loadSheet(event.target.value));

        if (SHEET_NAMES.length > 0) {
            loadSheet(SHEET_NAMES[0]);
        }
    </script>
</body>
</html>
