<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Спортивный портал</title>
    <style>
        /* =========================================
           ОСНОВНОЙ ДИЗАЙН И ФОН
           ========================================= */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            /* Жестко фиксируем градиент, чтобы он не скроллился вместе со страницей */
            background: linear-gradient(135deg, rgb(0, 136, 187) 0%, rgb(0, 187, 238) 100%) fixed;
            color: #333; 
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .header-wrapper {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            max-height: 60px;
            max-width: 150px;
            object-fit: contain;
        }

        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin: 0; 
            font-size: 28px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
        }
        
        .table-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            /* Слегка прозрачный белый фон контейнера для объема */
            background: rgba(255, 255, 255, 0.98); 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border-radius: 12px; 
        }
        
        .controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .controls label { font-weight: bold; font-size: 16px; color: #555;}
        
        select { 
            padding: 10px 15px; 
            font-size: 16px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            cursor: pointer; 
            outline: none; 
            background-color: #fff; 
            min-width: 180px;
            transition: all 0.2s;
        }
        select:focus, select:hover { border-color: rgb(0, 187, 238); }
        
        #group-title { text-align: center; color: #333; font-size: 22px; margin-bottom: 15px; margin-top: 10px; }
        
        .table-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            /* Убрано жесткое ограничение ширины для мобилок */
        }
        
        th, td { 
            padding: 12px 10px; 
            text-align: center; 
            border: 1px solid #ddd; 
            vertical-align: middle; 
            /* Разрешаем перенос текста по словам */
            white-space: normal; 
            word-wrap: break-word;
        }
        
        th { 
            background-color: rgb(255, 187, 68); 
            color: #222; 
            font-weight: bold; 
            border-color: rgb(230, 160, 50); 
        }
        tr:hover td { background-color: #f5f9ff; }

        .sub-header td { 
            background-color: rgb(255, 204, 136) !important; 
            font-weight: bold; 
            color: #222; 
            font-size: 16px; 
            border-top: 2px solid rgb(255, 187, 68); 
            border-bottom: 2px solid rgb(255, 187, 68);
        }

        #judge-info { text-align: right; font-size: 15px; font-weight: bold; font-style: italic; color: #666; margin-top: 15px; }
        #loading { text-align: center; font-size: 18px; color: #666; margin: 20px 0; display: none; }

        /* =========================================
           АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ ТЕЛЕФОНОВ
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; } /* Оставляем поля, чтобы было видно градиент */
            
            .header-wrapper { flex-direction: column; margin-bottom: 15px; }
            .logo { position: relative; left: auto; top: auto; transform: none; margin-bottom: 10px; max-height: 45px; }
            h2 { font-size: 22px; }
            
            .table-container { padding: 12px; border-radius: 8px; }
            
            .controls { flex-direction: column; align-items: stretch; gap: 10px; padding-bottom: 10px; margin-bottom: 15px;}
            .control-group { flex-direction: column; align-items: stretch; gap: 5px; }
            select { width: 100%; font-size: 16px; padding: 10px; }
            
            #group-title { font-size: 18px; margin-bottom: 10px; }

            /* Магия компактной таблицы */
            th, td { 
                padding: 6px 4px; /* Минимальные отступы внутри ячеек */
                font-size: 12px;  /* Уменьшаем шрифт текста */
                line-height: 1.2; /* Уплотняем строки */
            }
            th { 
                font-size: 11px; /* Шапка еще чуть мельче */
            }
            
            .sub-header td { font-size: 13px; padding: 8px 4px; }
            #judge-info { font-size: 13px; text-align: center; } /* Судья по центру на мобилках */
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <h2>🏆 Спортивный портал</h2>
    </div>

    <div class="table-container">
        
        <div class="controls">
            <div class="control-group">
                <label for="sport-select">Вид спорта:</label>
                <select id="sport-select"></select>
            </div>
            <div class="control-group">
                <label for="sheet-select">Этап / Группа:</label>
                <select id="sheet-select"></select>
            </div>
        </div>

        <div id="loading">Загрузка данных... ⏳</div>

        <h3 id="group-title"></h3> 

        <div class="table-scroll-wrapper">
            <table id="tournament-table">
                <thead>
                    <tr id="table-headers"></tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>

        <div id="judge-info"></div>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКА ВИДОВ СПОРТА И ТАБЛИЦ
        // ==========================================
        const SPORTS_DATA = {
            "Волейбол": {
                id: "1Aq8Kow_unD9Z_mclRBg0mcPl8Ibh64_s7rqVrvdVq3I", 
                sheets: ['Расписание', 'Группа А', 'Группа Б']
            },
            "Баскетбол": {
                id: "ВСТАВЬТЕ_ID_ДЛЯ_БАСКЕТБОЛА", 
                sheets: ['Группа 1', 'Группа 2']
            }
        };
        // ==========================================

        const selectSportEl = document.getElementById('sport-select');
        const selectSheetEl = document.getElementById('sheet-select');
        const loadingEl = document.getElementById('loading');
        
        const groupTitleEl = document.getElementById('group-title');
        const tableHeadersEl = document.getElementById('table-headers');
        const tableBodyEl = document.getElementById('table-body');
        const judgeInfoEl = document.getElementById('judge-info');

        function init() {
            for (let sportName in SPORTS_DATA) {
                const option = document.createElement('option');
                option.value = sportName;
                option.textContent = sportName;
                selectSportEl.appendChild(option);
            }
            
            const firstSport = Object.keys(SPORTS_DATA)[0];
            updateSheetsList(firstSport);
        }

        function updateSheetsList(sportName) {
            selectSheetEl.innerHTML = ''; 
            const sheets = SPORTS_DATA[sportName].sheets;
            
            sheets.forEach(sheetName => {
                const option = document.createElement('option');
                option.value = sheetName;
                option.textContent = sheetName;
                selectSheetEl.appendChild(option);
            });

            if (sheets.length > 0) {
                loadTableData(sportName, sheets[0]);
            } else {
                clearTable();
                tableBodyEl.innerHTML = '<tr><td style="color:red;">Для этого спорта не указаны листы.</td></tr>';
            }
        }

        function clearTable() {
            groupTitleEl.textContent = '';
            tableHeadersEl.innerHTML = '';
            tableBodyEl.innerHTML = '';
            judgeInfoEl.textContent = '';
            judgeInfoEl.style.display = 'none';
        }

        function loadTableData(sportName, sheetName) {
            loadingEl.style.display = 'block';
            clearTable();

            const currentId = SPORTS_DATA[sportName].id;
            const API_URL = `https://docs.google.com/spreadsheets/d/${currentId}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(sheetName)}`;

            fetch(API_URL)
                .then(response => response.text())
                .then(text => {
                    const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1];
                    const data = JSON.parse(jsonString);
                    loadingEl.style.display = 'none';

                    if (!data.table || !data.table.rows || data.table.rows.length === 0) {
                        tableBodyEl.innerHTML = '<tr><td style="color:red;">Нет данных на листе.</td></tr>';
                        return;
                    }

                    let maxCols = 0;
                    const cleanRows = data.table.rows.map(row => {
                        const cells = row.c ? row.c.map(cell => {
                            if (!cell) return '';
                            let val = cell.f !== undefined ? cell.f : cell.v;
                            return val !== null ? String(val).trim() : '';
                        }) : [];
                        
                        let lastContent = -1;
                        for (let i = cells.length - 1; i >= 0; i--) {
                            if (cells[i] !== '') { lastContent = i; break; }
                        }
                        const actualCells = cells.slice(0, lastContent + 1);
                        if (actualCells.length > maxCols) maxCols = actualCells.length;
                        return actualCells;
                    });

                    let headerFound = false;

                    cleanRows.forEach((row, rowIndex) => {
                        while(row.length < maxCols) row.push('');
                        const populatedCells = row.filter(val => val !== '');
                        if (populatedCells.length === 0) return; 

                        const isJudgeRow = row.some(val => val.toLowerCase().includes('судья'));
                        if (isJudgeRow) {
                            judgeInfoEl.textContent = populatedCells.join(' ').replace(/: /g, ' ').replace(/Судья соревнований/i, 'Судья соревнований:');
                            judgeInfoEl.style.display = 'block';
                            return; 
                        }

                        if (!headerFound && populatedCells.length === 1 && rowIndex <= 1) {
                            groupTitleEl.textContent = populatedCells[0];
                            return;
                        }

                        if (!headerFound && populatedCells.length > 1) {
                            headerFound = true;
                            row.forEach(val => {
                                const th = document.createElement('th');
                                th.textContent = val;
                                tableHeadersEl.appendChild(th);
                            });
                            return;
                        }

                        if (headerFound) {
                            const tr = document.createElement('tr');

                            if (populatedCells.length === 1) {
                                tr.className = 'sub-header';
                                const td = document.createElement('td');
                                td.textContent = populatedCells[0];
                                td.colSpan = maxCols; 
                                tr.appendChild(td);
                            } 
                            else {
                                row.forEach(val => {
                                    const td = document.createElement('td');
                                    const cleanVal = val.toLowerCase().trim();
                                    
                                    const isRedCell = ['-', '—', '–', '−', 'нет'].includes(cleanVal);
                                    
                                    if (isRedCell) {
                                        td.style.backgroundColor = '#ff4d4d'; 
                                        td.textContent = ''; 
                                    } else {
                                        td.textContent = val; 
                                    }
                                    
                                    if (val.includes(':') && val.length <= 5) {
                                        td.style.fontWeight = 'bold';
                                    }

                                    tr.appendChild(td);
                                });
                            }
                            tableBodyEl.appendChild(tr);
                        }
                    });
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    loadingEl.style.display = 'none';
                    tableBodyEl.innerHTML = `<tr><td style="color: red;"><b>Ошибка загрузки!</b></td></tr>`;
                });
        }

        selectSportEl.addEventListener('change', (event) => {
            updateSheetsList(event.target.value);
        });

        selectSheetEl.addEventListener('change', (event) => {
            const currentSport = selectSportEl.value;
            loadTableData(currentSport, event.target.value);
        });

        init();
    </script>
</body>
</html>
