<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная таблица</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #2ea44f; margin-bottom: 20px; }
        
        .table-container { max-width: 950px; margin: 0 auto; overflow-x: auto; background: white; padding: 20px 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        
        /* Стили для панели управления (два меню рядом) */
        .controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .controls label { font-weight: bold; font-size: 16px; color: #555;}
        select { padding: 8px 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; outline: none; background-color: #fff; min-width: 150px;}
        select:hover { border-color: #2ea44f; }
        
        #group-title { text-align: center; color: #333; font-size: 22px; margin-bottom: 15px; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px 12px; text-align: center; border: 1px solid #ddd; vertical-align: middle; }
        
        th { background-color: #2ea44f; color: white; font-weight: bold; border-color: #1f853d; }
        tr:hover td { background-color: #f9f9f9; }

        .sub-header td { background-color: #e8f5e9 !important; font-weight: bold; color: #2ea44f; font-size: 16px; border-top: 2px solid #2ea44f; border-bottom: 2px solid #2ea44f;}

        #judge-info { text-align: right; font-size: 16px; font-weight: bold; font-style: italic; color: #555; }
        
        #loading { text-align: center; font-size: 18px; color: #666; margin: 20px 0; display: none; }
    </style>
</head>
<body>

    <div class="table-container">
        <h2>🏆 Спортивный портал</h2>
        
        <div class="controls">
            <div class="control-group">
                <label for="sport-select">Спорт:</label>
                <select id="sport-select"></select>
            </div>
            <div class="control-group">
                <label for="sheet-select">Блок:</label>
                <select id="sheet-select"></select>
            </div>
        </div>

        <div id="loading">Загрузка данных... ⏳</div>

        <h3 id="group-title"></h3> 

        <table id="tournament-table">
            <thead>
                <tr id="table-headers"></tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>

        <div id="judge-info"></div>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКА ВИДОВ СПОРТА И ТАБЛИЦ
        // ==========================================
        const SPORTS_DATA = {
            "Волейбол": {
                id: "1Aq8Kow_unD9Z_mclRBg0mcPl8Ibh64_s7rqVrvdVq3I", 
                sheets: ['Расписание', 'Группа А', 'Группа Б']
            },
            "Баскетбол": {
                id: "ВСТАВЬТЕ_ID_ДЛЯ_БАСКЕТБОЛА_СЮДА", 
                sheets: ['Группа 1', 'Группа 2', 'Плей-офф']
            },
            "Настольный теннис": {
                id: "ВСТАВЬТЕ_ID_ДЛЯ_ТЕННИСА_СЮДА", 
                sheets: ['Мужчины', 'Женщины']
            }
        };
        // ==========================================

        const selectSportEl = document.getElementById('sport-select');
        const selectSheetEl = document.getElementById('sheet-select');
        const loadingEl = document.getElementById('loading');
        
        const groupTitleEl = document.getElementById('group-title');
        const tableHeadersEl = document.getElementById('table-headers');
        const tableBodyEl = document.getElementById('table-body');
        const judgeInfoEl = document.getElementById('judge-info');

        // Инициализация: заполняем список видов спорта
        function init() {
            for (let sportName in SPORTS_DATA) {
                const option = document.createElement('option');
                option.value = sportName;
                option.textContent = sportName;
                selectSportEl.appendChild(option);
            }
            
            // Загружаем листы для первого спорта в списке
            const firstSport = Object.keys(SPORTS_DATA)[0];
            updateSheetsList(firstSport);
        }

        // Обновление списка листов при смене спорта
        function updateSheetsList(sportName) {
            selectSheetEl.innerHTML = ''; // Очищаем старые листы
            const sheets = SPORTS_DATA[sportName].sheets;
            
            sheets.forEach(sheetName => {
                const option = document.createElement('option');
                option.value = sheetName;
                option.textContent = sheetName;
                selectSheetEl.appendChild(option);
            });

            // Автоматически загружаем первый лист нового спорта
            if (sheets.length > 0) {
                loadTableData(sportName, sheets[0]);
            } else {
                clearTable();
                tableBodyEl.innerHTML = '<tr><td style="color:red;">Для этого спорта не указаны листы.</td></tr>';
            }
        }

        function clearTable() {
            groupTitleEl.textContent = '';
            tableHeadersEl.innerHTML = '';
            tableBodyEl.innerHTML = '';
            judgeInfoEl.textContent = '';
            judgeInfoEl.style.display = 'none';
        }

        // Загрузка данных из Google
        function loadTableData(sportName, sheetName) {
            loadingEl.style.display = 'block';
            clearTable();

            const currentId = SPORTS_DATA[sportName].id;
            const API_URL = `https://docs.google.com/spreadsheets/d/${currentId}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(sheetName)}`;

            fetch(API_URL)
                .then(response => response.text())
                .then(text => {
                    const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1];
                    const data = JSON.parse(jsonString);
                    loadingEl.style.display = 'none';

                    if (!data.table || !data.table.rows || data.table.rows.length === 0) {
                        tableBodyEl.innerHTML = '<tr><td style="color:red;">Нет данных на листе.</td></tr>';
                        return;
                    }

                    let maxCols = 0;
                    const cleanRows = data.table.rows.map(row => {
                        const cells = row.c ? row.c.map(cell => {
                            if (!cell) return '';
                            let val = cell.f !== undefined ? cell.f : cell.v;
                            return val !== null ? String(val).trim() : '';
                        }) : [];
                        
                        let lastContent = -1;
                        for (let i = cells.length - 1; i >= 0; i--) {
                            if (cells[i] !== '') { lastContent = i; break; }
                        }
                        const actualCells = cells.slice(0, lastContent + 1);
                        if (actualCells.length > maxCols) maxCols = actualCells.length;
                        return actualCells;
                    });

                    let headerFound = false;

                    cleanRows.forEach((row, rowIndex) => {
                        while(row.length < maxCols) row.push('');
                        const populatedCells = row.filter(val => val !== '');
                        if (populatedCells.length === 0) return; 

                        const isJudgeRow = row.some(val => val.toLowerCase().includes('судья'));
                        if (isJudgeRow) {
                            judgeInfoEl.textContent = populatedCells.join(' ').replace(/: /g, ' ').replace(/Судья соревнований/i, 'Судья соревнований:');
                            judgeInfoEl.style.display = 'block';
                            return; 
                        }

                        if (!headerFound && populatedCells.length === 1 && rowIndex <= 1) {
                            groupTitleEl.textContent = populatedCells[0];
                            return;
                        }

                        if (!headerFound && populatedCells.length > 1) {
                            headerFound = true;
                            row.forEach(val => {
                                const th = document.createElement('th');
                                th.textContent = val;
                                tableHeadersEl.appendChild(th);
                            });
                            return;
                        }

                        if (headerFound) {
                            const tr = document.createElement('tr');

                            if (populatedCells.length === 1) {
                                tr.className = 'sub-header';
                                const td = document.createElement('td');
                                td.textContent = populatedCells[0];
                                td.colSpan = maxCols; 
                                tr.appendChild(td);
                            } 
                            else {
                                row.forEach(val => {
                                    const td = document.createElement('td');
                                    const cleanVal = val.toLowerCase().trim();
                                    
                                    // Ловим прочерки и слово "нет"
                                    const isRedCell = ['-', '—', '–', '−', 'нет'].includes(cleanVal);
                                    
                                    if (isRedCell) {
                                        td.style.backgroundColor = '#ff4d4d'; 
                                        td.textContent = ''; 
                                    } else {
                                        td.textContent = val; 
                                    }
                                    
                                    if (val.includes(':') && val.length <= 5) {
                                        td.style.fontWeight = 'bold';
                                    }

                                    tr.appendChild(td);
                                });
                            }
                            tableBodyEl.appendChild(tr);
                        }
                    });
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    loadingEl.style.display = 'none';
                    tableBodyEl.innerHTML = `<tr><td style="color: red;"><b>Ошибка загрузки!</b></td></tr>`;
                });
        }

        // Слушатели событий для выпадающих списков
        selectSportEl.addEventListener('change', (event) => {
            updateSheetsList(event.target.value);
        });

        selectSheetEl.addEventListener('change', (event) => {
            const currentSport = selectSportEl.value;
            loadTableData(currentSport, event.target.value);
        });

        // Запускаем всё при загрузке страницы
        init();
    </script>
</body>
</html>
