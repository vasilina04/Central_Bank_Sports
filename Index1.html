<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная таблица</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; }
        .table-container { max-width: 800px; margin: 0 auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #2ea44f; color: white; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div class="table-container">
        <h2>🏆 Наша Турнирная Таблица</h2>
        <table id="tournament-table">
            </table>
    </div>

    <script>
        // ID вашей таблицы уже вставлен
        const SHEET_ID = '1Aq8Kow_unD9Z_mclRBg0mcPl8Ibh64_s7rqVrvdVq3I'; 
        
        // Ссылка для получения данных в формате TSV
        const TSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv`;

        fetch(TSV_URL)
            .then(response => {
                if (!response.ok) throw new Error("Ошибка сети");
                return response.text();
            })
            .then(tsvText => {
                // Проверка: если Google вместо данных отдает страницу авторизации (таблица закрыта)
                if (tsvText.includes('<!DOCTYPE html>') || tsvText.includes('<html')) {
                    throw new Error("Таблица закрыта настройками приватности.");
                }

                const rows = tsvText.split('\n');
                const table = document.getElementById('tournament-table');

                rows.forEach((row, index) => {
                    if (row.trim() === '') return; 
                    const cols = row.split('\t');
                    const tr = document.createElement('tr');

                    cols.forEach(col => {
                        const cell = document.createElement(index === 0 ? 'th' : 'td');
                        cell.textContent = col.replace(/\r/g, ''); 
                        tr.appendChild(cell);
                    });

                    table.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('tournament-table').innerHTML = `
                    <tr>
                        <td style="color: red; padding: 20px;">
                            <b>Ошибка загрузки данных!</b><br><br>
                            Убедитесь, что в Google Таблицах вы нажали: <br>
                            <i>Настройки доступа -> "Все, у кого есть ссылка" -> Читатель.</i>
                        </td>
                    </tr>`;
            });
    </script>
</body>
</html>
